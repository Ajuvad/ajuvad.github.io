<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  scroll-behavior: smooth;
}

/* GLASS NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.3);
}

/* NAV LINKS */
.navbar a {
  transition: 0.3s;
}
.navbar a:hover {
  color: #22c55e !important;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* TEXT */
.hero-content {
  position: relative;
  z-index: 2;
  animation: fadeIn 2s ease-in-out;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  background: #0f172a;
}

/* CARDS */
.card {
  background: #1e293b;
  border: none;
  border-radius: 15px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-10px);
}

/* ACTIVE LINK */
.navbar a.active {
  color: #22c55e !important;
  font-weight: bold;
}
</style>
