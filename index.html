<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c') no-repeat center center fixed;
  background-size: cover;
}

/* Navbar */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.6);
}

/* Sections */
.section {
  padding: 100px 20px;
  background: rgba(0,0,0,0.7);
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Cards */
.card {
  background: #1e293b;
  border: none;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">My Portfolio</a>
    <div>
      <a href="#home" class="text-white me-3">Home</a>
      <a href="#about" class="text-white me-3">About</a>
      <a href="#projects" class="text-white me-3">Projects</a>
      <a href="#contact" class="text-white">Contact</a>
    </div>
  </div>
</nav>

<div id="home" class="hero">
  <h1>Welcome</h1>
</div>

<div id="about" class="section container">
  <h2>About</h2>
  <p>Your details here</p>
</div>

<div id="projects" class="section container">
  <h2>Projects</h2>
  <p>Your work here</p>
</div>

<div id="contact" class="section container">
  <h2>Contact</h2>
  <p>Email here</p>
</div>

</body>
</html>
