<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Ajuvad</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  color:white;
  background: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center fixed;
  background-size: cover;
}

/* DARK OVERLAY */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
}

.navbar a {
  color:white;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.navbar a:hover {
  color:#38bdf8;
}

/* CONTAINER */
.container {
  max-width:700px;
  margin:120px auto;
  padding:20px;
  text-align:center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding:40px;
  border-radius:15px;
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* TEXT */
h2 {
  font-size:32px;
  margin-bottom:20px;
}

p {
  color:#ccc;
  font-size:16px;
  margin:10px 0;
}

/* CONTACT INFO */
.contact-info {
  margin-top:20px;
}

.contact-info p {
  font-size:17px;
}

/* BUTTON */
.button {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background: linear-gradient(45deg, #38bdf8, cyan);
  color:black;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  transition:0.3s;
}

.button:hover {
  transform:scale(1.05);
}

/* ICONS */
.icons {
  margin-top:30px;
}

.icons a {
  color:white;
  font-size:26px;
  margin:0 12px;
  transition:0.3s;
}

.icons a:hover {
  color:#38bdf8;
  transform:scale(1.2);
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  margin-top:40px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="projects.html">Projects</a>
<a href="portfolio.html">Portfolio</a>
<a href="contact.html">Contact</a>
</div>

<!-- CONTACT -->
<div class="container">
  <div class="card">
    <h2>Get In Touch</h2>

    <p>
      I’m open to opportunities in marketing, sales, and business development. 
      Feel free to reach out for collaboration or job opportunities.
    </p>

    <div class="contact-info">
      <p>📧 ajuvad123avm@gmail.com</p>
      <p>📞 +91 8848675359</p>
    </div>

    <a href="mailto:ajuvad123avm@gmail.com" class="button">Send Email</a>

    <div class="icons">
      <a href="https://instagram.com/aju_vad_aju" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://linkedin.com/in/ajuvad-aju" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/Ajuvad" target="_blank"><i class="fab fa-github"></i></a>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
© 2026 Ajuvad | All Rights Reserved
</footer>

</body>
</html>
