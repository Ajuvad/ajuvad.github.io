<style>
body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  color:white;

  background: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center fixed;
  background-size: cover;
}

/* DARK OVERLAY */
body::before {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.65);
  z-index:-1;
}

/* NAVBAR */
.navbar {
  text-align:center;
  padding:20px;
  background: rgba(0,0,0,0.8);
  position: sticky;
  top:0;
  backdrop-filter: blur(10px);
}

.navbar a {
  color:white;
  margin:15px;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.navbar a:hover {
  color:cyan;
  text-shadow:0 0 10px cyan;
}

/* CONTACT BOX */
.box {
  margin:120px auto;
  width:60%;
  text-align:center;
  background: rgba(255,255,255,0.05);
  padding:40px;
  border-radius:12px;
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* TEXT */
h2 {
  font-size:32px;
  margin-bottom:20px;
}

p {
  font-size:18px;
  margin:12px 0;
  color:#ddd;
}

/* HIGHLIGHT TEXT */
.highlight {
  color:white;
  font-weight:bold;
}

/* ICONS */
.icons {
  margin-top:30px;
}

.icons a {
  color:white;
  font-size:28px;
  margin:0 15px;
  transition:0.3s;
}

.icons a:hover {
  color:cyan;
  transform:scale(1.2);
}
</style>
</head>
